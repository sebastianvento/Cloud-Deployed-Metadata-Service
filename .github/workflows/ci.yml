name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Python (for Robot Framework)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      - name: Install Robot Framework
        run: pip install robotframework robotframework-requests pymongo psycopg[binary] python-dotenv

      - name: Build
        run: npm run build

      - name: Check build output
        run: ls dist

      - name: Start databases
        run: |
          docker run -d -p 27017:27017 --name mongo mongo:7
          docker compose up -d postgres
          sleep 15

      # Start API for integration tests
      - name: Start API server
        run: |
          node dist/server.js > server.log 2>&1 &
          sleep 15
          cat server.log
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          PGUSER: viihde
          PGPASSWORD: viihdepass
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: legacy_metadata

      - name: Show server log before tests
        run: cat server.log

      # Run Robot tests
      - name: Run Robot tests
        run: robot robot/tests/
      - name: Show server log
        if: always()
        run: cat server.log

      - name: Build Docker image
        run: docker build -t europe-north1-docker.pkg.dev/viihde-sprint/cloud-run-source-deploy/cloud-deployed-metadata-service:${{ github.sha }} .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev --quiet

      - name: Push Docker image
        run: docker push europe-north1-docker.pkg.dev/viihde-sprint/cloud-run-source-deploy/cloud-deployed-metadata-service:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy viihde-sprint \
            --image europe-north1-docker.pkg.dev/viihde-sprint/cloud-run-source-deploy/cloud-deployed-metadata-service:${{ github.sha }} \
            --region europe-north1 \
            --platform managed \
            --quiet